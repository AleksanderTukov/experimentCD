workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

image: python:3.7


stages:
  - build
  - test


before_script:
    - pip install -r requirements.txt

unittest:
  stage: test
  script:
    - pytest test

mypy:
  stage: test
  script:
    - mypy src/main.py/

black:
  stage: test
  script:
    - black --diff --check src/main.py/

isort:
  stage: test
  script:
    - isort --check-only src/main.py/

flask8:
  stage: test
  script:
    - flake8 src/main.py/